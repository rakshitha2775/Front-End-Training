<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>To-Do App</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    background:linear-gradient(135deg,#4facfe,#00f2fe);
}

.container{
    width:420px;
    background:#fff;
    border-radius:20px;
    padding:30px;
    box-shadow:0 15px 35px rgba(0,0,0,.2);
}

h1{
    text-align:center;
    color:#0077b6;
    margin-bottom:8px;
}

.subtitle{
    text-align:center;
    color:#666;
    margin-bottom:25px;
}

.input-box{
    display:flex;
    gap:10px;
}

input{
    flex:1;
    padding:14px;
    border:none;
    outline:none;
    background:#eef6ff;
    border-radius:10px;
    font-size:16px;
}

button{
    padding:14px 22px;
    border:none;
    border-radius:10px;
    background:#0096c7;
    color:white;
    cursor:pointer;
    font-size:15px;
    transition:.3s;
}

button:hover{
    background:#0077b6;
    transform:scale(1.05);
}

ul{
    list-style:none;
    margin-top:25px;
}

li{
    background:#f5faff;
    padding:15px;
    margin-bottom:12px;
    border-radius:12px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    animation:fadeIn .3s ease;
    transition:.3s;
}

li:hover{
    transform:translateY(-3px);
    box-shadow:0 8px 15px rgba(0,0,0,.1);
}

.task{
    flex:1;
    cursor:pointer;
    color:#333;
    font-size:16px;
}

.completed{
    text-decoration:line-through;
    color:gray;
}

.delete-btn{
    background:#ff4d6d;
    padding:8px 14px;
    border:none;
    color:white;
    border-radius:8px;
    cursor:pointer;
}

.delete-btn:hover{
    background:#d90429;
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(-10px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}
</style>

</head>
<body>

<div class="container">

    <h1>📝 To-Do App</h1>
    <p class="subtitle">Organize your daily tasks</p>

    <div class="input-box">
        <input type="text" id="taskInput" placeholder="Enter a task...">
        <button onclick="addTask()">Add</button>
    </div>

    <!-- Tasks appear here -->
    <ul id="taskList"></ul>

</div>

<script>

const input = document.getElementById("taskInput");
const taskList = document.getElementById("taskList");

function addTask(){

    let task = input.value.trim();

    if(task === ""){
        alert("Please enter a task.");
        return;
    }

    const li = document.createElement("li");

    const span = document.createElement("span");
    span.className = "task";
    span.innerText = task;

    // Click task to complete
    span.onclick = function(){
        span.classList.toggle("completed");
    }

    const del = document.createElement("button");
    del.innerText = "Delete";
    del.className = "delete-btn";

    del.onclick = function(){
        li.remove();
    }

    li.appendChild(span);
    li.appendChild(del);

    taskList.appendChild(li);

    input.value="";
    input.focus();

}

// Press Enter to add task
input.addEventListener("keypress",function(e){
    if(e.key==="Enter"){
        addTask();
    }
});

</script>

</body>
</html>
